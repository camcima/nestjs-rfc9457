pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,js}'
      run: npx eslint {staged_files}
    format:
      glob: '*.{ts,js,json,md,yml,yaml}'
      run: npx prettier --check {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  commands:
    gitleaks:
      run: gitleaks git --no-banner --redact -v
      skip:
        - ref: main
